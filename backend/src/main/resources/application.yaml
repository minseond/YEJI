spring:
  datasource:
    # 1. AWS RDS 엔드포인트를 입력하세요 (예: fortune-db.xxxx.rds.amazonaws.com)
    url: jdbc:postgresql://yeji-db-v2.cf8ewuosusgf.ap-northeast-2.rds.amazonaws.com:5432/postgres

    # 2. RDS 생성 시 설정한 마스터 사용자 이름 (기본값: postgres)
    username: postgres

    # 3. RDS 생성 시 설정한 비밀번호
    password: ${RDS_PASSWORD}

    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # create: 시작할 때 기존 테이블 삭제 후 재생성 (주의!)
      # update: 변경된 스키마만 반영 (권장)
      # validate: Entity와 DB가 맞는지 확인만 함
      ddl-auto: update
    show-sql: true # 실행되는 SQL 로그 출력
    properties:
      hibernate:
        format_sql: true # SQL 로그 예쁘게 출력
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis 설정 (아직 Redis가 없다면 일단 주석 처리하거나 로컬로 설정)
  data:
    redis:
      host: localhost
      port: 6379

  # OAuth2 설정 (나중에 키 발급받으면 입력)
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: "${KAKAO_CLIENT_ID}"
            client-secret: "${KAKAO_CLIENT_SECRET}"
            scope: profile_nickname, account_email
            client-name: Kakao
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-authentication-method: client_secret_post
          naver:
            client-id: "${NAVER_CLIENT_ID}"
            client-secret: "${NAVER_CLIENT_SECRET}"
            scope: name, email, profile_image
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          google:
            client-id: "${GOOGLE_CLIENT_ID}"
            client-secret: "${GOOGLE_CLIENT_SECRET}"
            scope: profile, email

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
  mail:
    host: smtp.gmail.com
    port: 8988
    username: "본인의_구글_이메일@gmail.com"
    password: "앱_비밀번호_16자리" # 구글 계정 설정 -> 보안 -> 앱 비밀번호에서 발급
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace # 바인딩 파라미터 확인용

# JWT 설정
jwt:
  secret: ${JWT_SECRET} # 환경변수 config 필수

# PG사 결제 설정
portone:
  api:
    key: ${PORTONE_KEY}
    secret: ${PORTONE_SECRET}